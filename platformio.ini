[platformio]
default_envs = esp32c3

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
upload_port = COM5
monitor_port = COM5
monitor_speed = 115200
upload_speed = 460800
build_flags =
  -D USE_NIMBLE
lib_deps =
  h2zero/NimBLE-Arduino @ ^1.4.2
  T-vK/ESP32 BLE Keyboard @ ^0.3.2
  olikraus/U8g2 @ ^2.36.12